spring.application.name=IntelligentOutfitRecommendationSystem

spring.datasource.url=jdbc:mysql://localhost:3307/intelligent_outfit?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

app.internal-api.token=dev-internal-token

app.jwt.secret=dev-jwt-secret-for-local-development-change-before-production-2026
app.jwt.access-token-seconds=1800
app.jwt.refresh-token-days=14

app.ai.python-base-url=http://localhost:8000
app.ai.connect-timeout-ms=2000
app.ai.read-timeout-ms=30000

server.port=8080
