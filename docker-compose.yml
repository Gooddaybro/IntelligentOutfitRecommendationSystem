services:
  mysql:
    image: mysql:8.0
    container_name: intelligent_outfit_mysql
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-intelligent_outfit}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - intelligent_outfit_mysql_data:/var/lib/mysql
  redis:
    image: redis:7.2
    container_name: intelligent_outfit_redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - intelligent_outfit_redis_data:/data
  langgraph-postgres:
    image: postgres:16
    container_name: intelligent_outfit_langgraph_postgres
    ports:
      - "${LANGGRAPH_POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${LANGGRAPH_POSTGRES_DATABASE:-langgraph}
      POSTGRES_USER: ${LANGGRAPH_POSTGRES_USERNAME:-langgraph}
      POSTGRES_PASSWORD: ${LANGGRAPH_POSTGRES_PASSWORD:-change-me-locally}
      TZ: Asia/Shanghai
    volumes:
      - langgraph_postgres_data:/var/lib/postgresql/data

volumes:
  intelligent_outfit_mysql_data:
  intelligent_outfit_redis_data:
  langgraph_postgres_data:
