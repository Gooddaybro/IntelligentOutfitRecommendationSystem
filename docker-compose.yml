services:
  mysql:
    image: mysql:8.0
    container_name: intelligent_outfit_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: intelligent_outfit
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - intelligent_outfit_mysql_data:/var/lib/mysql
  redis:
    image: redis:7.2
    container_name: intelligent_outfit_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - intelligent_outfit_redis_data:/data

volumes:
  intelligent_outfit_mysql_data:
  intelligent_outfit_redis_data:
