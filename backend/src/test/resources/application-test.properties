spring.datasource.url=jdbc:h2:mem:intelligent_outfit_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s

app.cache.ttl.product-detail-minutes=60
app.cache.ttl.product-detail-jitter-minutes=0
app.cache.ttl.user-profile-minutes=20
app.cache.ttl.user-profile-jitter-minutes=0
app.cache.ttl.recommendation-candidates-minutes=10
app.cache.ttl.recommendation-candidates-jitter-minutes=0
app.cache.ttl.assistant-rate-limit-seconds=60

app.ai.rate-limit.user-per-minute=10

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

app.internal-api.token=test-internal-token

app.jwt.secret=test-jwt-secret-for-integration-tests-change-before-production
app.jwt.access-token-seconds=1800
app.jwt.refresh-token-days=14

app.ai.python-base-url=http://localhost:8000
app.ai.connect-timeout-ms=2000
app.ai.read-timeout-ms=30000
app.ai.stream-timeout-ms=120000

order.unpaid-timeout-minutes=30
order.timeout-close-batch-size=50
order.timeout-close-fixed-delay-ms=60000
