spring.application.name=IntelligentOutfitRecommendationSystem

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/intelligent_outfit?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2s

app.cache.ttl.product-detail-minutes=60
app.cache.ttl.product-detail-jitter-minutes=5
app.cache.ttl.user-profile-minutes=20
app.cache.ttl.user-profile-jitter-minutes=5
app.cache.ttl.recommendation-candidates-minutes=10
app.cache.ttl.recommendation-candidates-jitter-minutes=5
app.cache.ttl.assistant-rate-limit-seconds=60

app.ai.rate-limit.user-per-minute=10

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

app.internal-api.token=${APP_INTERNAL_API_TOKEN:dev-internal-token}

app.jwt.secret=${APP_JWT_SECRET:dev-jwt-secret-for-local-development-change-before-production-2026}
app.jwt.access-token-seconds=1800
app.jwt.refresh-token-days=14

app.ai.python-base-url=${APP_AI_PYTHON_BASE_URL:http://localhost:8000}
app.ai.connect-timeout-ms=2000
app.ai.read-timeout-ms=30000
app.ai.stream-timeout-ms=120000
app.ai.stream-read-timeout-ms=120000
app.ai.python-internal-token=${APP_AI_PYTHON_INTERNAL_TOKEN:${APP_INTERNAL_API_TOKEN:dev-internal-token}}
app.ai.circuit-breaker.enabled=true
app.ai.circuit-breaker.sliding-window-size=4
app.ai.circuit-breaker.minimum-number-of-calls=4
app.ai.circuit-breaker.failure-rate-threshold=50
app.ai.circuit-breaker.wait-duration-ms=10000
app.ai.circuit-breaker.half-open-permitted-calls=1

order.unpaid-timeout-minutes=30
order.timeout-close-batch-size=50
order.timeout-close-fixed-delay-ms=60000
app.order.idempotency.retention=PT24H
app.order.idempotency.cleanup-delay=PT1H
app.order.idempotency.cleanup-batch-size=500

app.payment.provider.callback-secrets.alipay=${APP_PAYMENT_ALIPAY_CALLBACK_SECRET:dev-alipay-callback-secret-change-before-production}
app.payment.provider.callback-secrets.wechat=${APP_PAYMENT_WECHAT_CALLBACK_SECRET:dev-wechat-callback-secret-change-before-production}

server.port=8080

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-components=always
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.info.build.enabled=true
management.info.env.enabled=true
info.app.commit=${GIT_COMMIT:unknown}

spring.ai.model.chat=none
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.moderation=none
